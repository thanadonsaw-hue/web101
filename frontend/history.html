<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Order History - PerX Shop</title>
    <link rel="stylesheet" href="assets/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(5px);
            z-index: 3000;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        .modal-overlay.active {
            display: flex;
            opacity: 1;
        }
        .auth-modal {
            background: #ffffff;
            width: 400px;
            padding: 40px;
            border-radius: 20px;
            position: relative;
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
            text-align: center;
            transform: translateY(-20px);
            transition: transform 0.3s ease;
        }
        .modal-overlay.active .auth-modal {
            transform: translateY(0);
        }
        .close-modal {
            position: absolute;
            right: 20px; top: 20px;
            background: none; border: none;
            font-size: 1.5rem; cursor: pointer;
            color: #9ca3af; transition: 0.2s;
        }
        .close-modal:hover { color: #e63946; }
        
        .modal-input-group {
            position: relative;
            margin-bottom: 15px;
            text-align: left;
        }
        .modal-input-group input {
            width: 100%;
            padding: 12px 40px 12px 15px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            font-size: 14px;
            font-family: 'Kanit', sans-serif;
            outline: none;
            box-sizing: border-box;
        }
        .modal-input-group input:focus { border-color: #e63946; }
        .modal-toggle-password {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #6b7280;
            font-size: 16px;
        }
        .modal-toggle-password:hover { color: #e63946; }

        .alert-box {
            font-size: 13px; margin-bottom: 15px; display: none; padding: 10px;
            border-radius: 8px; text-align: left;
        }
        .error { color: #dc2626; background: #fef2f2; border: 1px solid #fecaca; }
        .success { color: #059669; background: #ecfdf5; border: 1px solid #a7f3d0; }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="brand" onclick="location.href='index.html'" style="cursor:pointer">
            <h2 class="brand-title">PerX Shop</h2>
        </div>
        
        <div class="nav-menu">
            <a href="index.html">หน้าหลัก</a>
            <a href="pages/shop/index.html">ร้านค้า</a>
        </div>

        <div class="nav-right-group">
            <div class="cart-wrapper" onclick="location.href='pages/shop/index.html'">
                <button class="icon-btn">
                    <i class="fa-solid fa-cart-shopping"></i>
                    <span id="cart-count" class="cart-badge">0</span>
                </button>
            </div>
            <div id="auth-section" class="user-menu-container"></div>
        </div>
    </nav>

    <div class="container">
        <h2 class="page-title">ประวัติการสั่งซื้อของคุณ</h2>
        <div id="order-list">
            <p style="text-align:center; color:#888;">กำลังโหลดข้อมูล...</p>
        </div>
    </div>

    <div id="loginModal" class="modal-overlay">
        <div class="auth-modal">
            <button class="close-modal" onclick="closeModal('loginModal')"><i class="fa-solid fa-xmark"></i></button>
            <h2 style="margin-bottom: 25px;">เข้าสู่ระบบ</h2>
            
            <div class="modal-input-group">
                <input type="text" id="login-username" placeholder="ชื่อผู้ใช้">
            </div>
            <div class="modal-input-group">
                <input type="password" id="login-password" placeholder="รหัสผ่าน">
                <i class="fa-solid fa-eye modal-toggle-password" id="login-eye" onclick="togglePassword('login-password', 'login-eye')"></i>
            </div>

            <div id="login-alert" class="alert-box error"></div>

            <button class="hero-btn" onclick="modalLogin()" style="width:100%; border-radius:8px; padding: 12px; margin-top: 10px; border: none; background: #e63946; color: white; cursor: pointer; font-family: 'Kanit'; font-weight: bold;">เข้าสู่ระบบ</button>
            
            <p style="margin-top: 20px; font-size: 14px; color: #6b7280;">
                ยังไม่มีบัญชี? <a href="#" onclick="switchModal('loginModal', 'registerModal')" style="color:#e63946; text-decoration:none; font-weight: 600;">สมัครสมาชิกที่นี่</a>
            </p>
        </div>
    </div>

    <div id="registerModal" class="modal-overlay">
        <div class="auth-modal">
            <button class="close-modal" onclick="closeModal('registerModal')"><i class="fa-solid fa-xmark"></i></button>
            <h2 style="margin-bottom: 25px;">สร้างบัญชีใหม่</h2>
            
            <div class="modal-input-group">
                <input type="text" id="reg-username" placeholder="ชื่อผู้ใช้ (Username)">
            </div>
            <div class="modal-input-group">
                <input type="password" id="reg-password" placeholder="รหัสผ่าน (Password)">
                <i class="fa-solid fa-eye modal-toggle-password" id="reg-eye" onclick="togglePassword('reg-password', 'reg-eye')"></i>
            </div>
            
            <hr style="border: 0; border-top: 1px solid #f3f4f6; margin: 15px 0;">
            
            <div class="modal-input-group">
                <input type="text" id="reg-firstname" placeholder="ชื่อจริง">
            </div>
            <div class="modal-input-group">
                <input type="text" id="reg-lastname" placeholder="นามสกุล">
            </div>

            <div id="reg-alert" class="alert-box"></div>

            <button class="hero-btn" onclick="modalRegister()" style="width:100%; border-radius:8px; padding: 12px; margin-top: 10px; border: none; background: #e63946; color: white; cursor: pointer; font-family: 'Kanit'; font-weight: bold;">สมัครสมาชิก</button>
            
            <p style="margin-top: 20px; font-size: 14px; color: #6b7280;">
                มีบัญชีอยู่แล้ว? <a href="#" onclick="switchModal('registerModal', 'loginModal')" style="color:#e63946; text-decoration:none; font-weight: 600;">เข้าสู่ระบบ</a>
            </p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/axios@1.1.2/dist/axios.min.js"></script>
    <script>
        const user = JSON.parse(localStorage.getItem('user'))
        const url = 'http://localhost:8000'

        const toggleMenu = () => { 
            const dropdown = document.getElementById('myDropdown')
            if (dropdown) dropdown.classList.toggle('show') 
        }

        const logout = () => { 
            localStorage.clear() 
            location.href = 'index.html' 
        }

        const updateUI = () => {
            const section = document.getElementById('auth-section')
            if (user) {
                section.innerHTML = `
                <div class="user-menu-container">
                    <button onclick="toggleMenu()" class="icon-btn">
                        <i class="fa-solid fa-circle-user"></i>
                    </button>
                    <div id="myDropdown" class="dropdown-content">
                        <div style="padding: 10px 20px; font-size: 12px; color: #999; border-bottom: 1px solid #f3f4f6;">
                            ผู้ใช้: ${user.username}
                        </div>
                        ${user.role === 'admin' ? '<a href="pages/admin/index.html">หน้าแอดมิน</a>' : ''}
                        <a href="history.html">ประวัติการสั่งซื้อ</a>
                        <button onclick="logout()" class="logout-btn" style="color: #ef4444;">ออกจากระบบ</button>
                    </div>
                </div>`
            } else {
                section.innerHTML = '<button class="icon-btn" onclick="openModal(\'loginModal\')"><i class="fa-regular fa-circle-user"></i></button>'
                openModal('loginModal')
                document.getElementById('order-list').innerHTML = '<p style="text-align:center; color:#888; padding: 20px;">กรุณาเข้าสู่ระบบเพื่อดูประวัติการสั่งซื้อ</p>'
            }
        }

        const openModal = (modalId) => {
            document.getElementById(modalId).classList.add('active')
            clearAlerts()
        }

        const closeModal = (modalId) => {
            document.getElementById(modalId).classList.remove('active')
        }

        const switchModal = (closeId, openId) => {
            closeModal(closeId)
            setTimeout(() => { openModal(openId) }, 200)
        }

        const clearAlerts = () => {
            document.getElementById('login-alert').style.display = 'none'
            document.getElementById('reg-alert').style.display = 'none'
        }

        const togglePassword = (inputId, iconId) => {
            const input = document.getElementById(inputId)
            const icon = document.getElementById(iconId)
            if (input.type === 'password') {
                input.type = 'text'
                icon.classList.remove('fa-eye')
                icon.classList.add('fa-eye-slash')
            } else {
                input.type = 'password'
                icon.classList.remove('fa-eye-slash')
                icon.classList.add('fa-eye')
            }
        }

        const modalLogin = async () => {
            const username = document.getElementById('login-username').value
            const password = document.getElementById('login-password').value
            const alertBox = document.getElementById('login-alert')
            
            alertBox.style.display = 'none'

            if (!username || !password) {
                alertBox.innerText = 'กรุณากรอกข้อมูลให้ครบถ้วน'
                alertBox.className = 'alert-box error'
                alertBox.style.display = 'block'
                return
            }

            try {
                const res = await axios.post(`${url}/login`, { username, password })
                if (res.data && res.data.user) {
                    localStorage.setItem('user', JSON.stringify(res.data.user))
                    location.reload()
                }
            } catch (error) { 
                alertBox.innerText = 'ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง'
                alertBox.className = 'alert-box error'
                alertBox.style.display = 'block'
            }
        }

        const modalRegister = async () => {
            const username = document.getElementById('reg-username').value
            const password = document.getElementById('reg-password').value
            const firstname = document.getElementById('reg-firstname').value
            const lastname = document.getElementById('reg-lastname').value
            const alertBox = document.getElementById('reg-alert')
            
            alertBox.style.display = 'none'

            if (!username || !password || !firstname || !lastname) {
                alertBox.innerText = 'กรุณากรอกข้อมูลให้ครบถ้วน'
                alertBox.className = 'alert-box error'
                alertBox.style.display = 'block'
                return
            }

            try {
                const res = await axios.post(`${url}/register`, { username, password, firstname, lastname })
                if (res.data.success) {
                    alertBox.innerText = 'สมัครสมาชิกสำเร็จ! กำลังสลับไปหน้าเข้าสู่ระบบ...'
                    alertBox.className = 'alert-box success'
                    alertBox.style.display = 'block'
                    setTimeout(() => { switchModal('registerModal', 'loginModal') }, 2000) 
                }
            } catch (error) {
                alertBox.innerText = (error.response?.data?.error || 'เกิดข้อผิดพลาดในการสมัครสมาชิก')
                alertBox.className = 'alert-box error'
                alertBox.style.display = 'block'
            }
        }

        document.getElementById('login-password').addEventListener('keypress', (e) => { if (e.key === 'Enter') modalLogin() })
        document.getElementById('reg-lastname').addEventListener('keypress', (e) => { if (e.key === 'Enter') modalRegister() })

        const loadOrders = async () => {
            if (!user) return
            try {
                const res = await axios.get(`${url}/orders/${user.id}`)
                const orders = res.data
                
                if (orders.length === 0) {
                    document.getElementById('order-list').innerHTML = '<p style="text-align:center; color:#888; padding: 20px;">ยังไม่มีประวัติการสั่งซื้อครับ ลองไปดูสินค้าหน้าร้านค้าสิ!</p>'
                    return
                }

                document.getElementById('order-list').innerHTML = orders.map(order => {
                    const date = new Date(order.created_at).toLocaleString('th-TH')
                    let statusColor = '#f59e0b'
                    let statusText = 'รอดำเนินการ'
                    
                    if (order.status === 'shipped') { statusColor = '#3b82f6'; statusText = 'จัดส่งแล้ว' }
                    else if (order.status === 'completed') { statusColor = '#10b981'; statusText = 'สำเร็จ' }
                    else if (order.status === 'cancelled') { statusColor = '#ef4444'; statusText = 'ยกเลิก' }

                    return `
                    <div class="order-card">
                        <div class="order-info">
                            <div class="order-id">รหัสคำสั่งซื้อ: #ORD-${order.id.toString().padStart(4, '0')}</div>
                            <div class="order-status">สถานะ: <span style="color: ${statusColor}; font-weight: 600;">${statusText}</span></div>
                            <div class="order-date">สั่งซื้อเมื่อ: ${date}</div>
                        </div>
                        <div class="order-total">${parseFloat(order.total_price).toLocaleString()} THB</div>
                    </div>`
                }).join('')
            } catch (error) {
                console.error(error)
                document.getElementById('order-list').innerHTML = '<p style="color:#ef4444; text-align:center; padding: 20px;">เกิดข้อผิดพลาดในการดึงข้อมูล</p>'
            }
        }

        window.onclick = (event) => {
            if (event.target.classList.contains('modal-overlay')) {
                closeModal(event.target.id)
            }
            if (!event.target.closest('.user-menu-container') && !event.target.closest('.modal-overlay')) {
                const dropdowns = document.getElementsByClassName('dropdown-content')
                for (let d of dropdowns) { d.classList.remove('show') }
            }
        }

        window.onload = () => { updateUI(); loadOrders() }
    </script>
</body>
</html>
