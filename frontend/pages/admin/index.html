<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Admin Panel - PerX Shop</title>
    <link rel="stylesheet" href="../../assets/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <header class="admin-header">
        <div>
            <a href="../../index.html" style="color: #6b7280; text-decoration: none; font-size: 14px;">← กลับหน้าหลัก</a>
            <h1 style="color: #111827; margin: 5px 0; font-size: 28px;">Admin Panel</h1>
        </div>
        <div id="admin-info" style="font-weight: 600; color: #e63946;"></div>
    </header>

    <div class="container" style="padding: 40px 8%; max-width: 1400px; margin: auto;">
        <div class="admin-section">
            <h2 id="form-title" style="margin-bottom: 20px; font-size: 20px;">เพิ่มสินค้าใหม่</h2>
            <div id="alert-msg" class="alert-box"></div>
            <div style="display: flex; gap: 12px; flex-wrap: wrap; align-items: center;">
                <input type="text" id="p-name" placeholder="ชื่อสินค้า" style="flex: 2;">
                <input type="number" id="p-price" placeholder="ราคา" style="width: 130px;">
                <input type="number" id="p-stock" placeholder="สต็อก" style="width: 100px;">
                <input type="file" id="p-image" accept="image/*" style="font-size: 13px;">
                <button id="submit-btn" onclick="submitProduct()" class="btn-save" style="padding: 11px 25px; border-radius: 8px; cursor: pointer;">เพิ่มสินค้า</button>
                <button id="cancel-btn" onclick="cancelEdit()" style="display: none; background: #9ca3af; color: white; border: none; padding: 11px 20px; border-radius: 8px; cursor: pointer;">ยกเลิก</button>
            </div>
        </div>

        <div class="admin-section">
            <h2 style="font-size: 20px;">รายการสินค้าทั้งหมด</h2>
            <table>
                <thead>
                    <tr>
                        <th style="width: 80px;">รูป</th>
                        <th>ชื่อสินค้า</th>
                        <th>ราคา</th>
                        <th>สต็อก</th>
                        <th style="width: 180px;">จัดการ</th>
                    </tr>
                </thead>
                <tbody id="product-list"></tbody>
            </table>
        </div>

        <div class="admin-section">
            <h2 style="font-size: 20px; color: #111827;">จัดการคำสั่งซื้อ</h2>
            <table>
                <thead>
                    <tr>
                        <th>รหัสบิล</th>
                        <th>ลูกค้า</th>
                        <th>วันที่สั่งซื้อ</th>
                        <th>ยอดรวม</th>
                        <th>สถานะ</th>
                        <th style="width: 250px;">จัดการ</th>
                    </tr>
                </thead>
                <tbody id="order-list"></tbody>
            </table>
        </div>
    </div>

    <div id="orderModal" class="modal-overlay">
        <div class="modal-content">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h2 style="margin: 0; font-size: 20px;">รายการสินค้าในบิล</h2>
                <button onclick="closeOrderModal()" style="background:none; border:none; cursor:pointer; font-size: 20px; color: #9ca3af;">✕</button>
            </div>
            <div id="modal-items"></div>
            <button onclick="closeOrderModal()" style="width: 100%; padding: 12px; background: #111827; color: white; border: none; border-radius: 8px; margin-top: 25px; cursor: pointer; font-weight: 600;">ปิดหน้าต่าง</button>
        </div>
    </div>

    <div id="deleteModal" class="modal-overlay">
        <div class="auth-modal" style="width: 360px;">
            <h2>ยืนยันการลบ</h2>
            <p style="margin-bottom: 25px; color: #6b7280;">คุณแน่ใจหรือไม่ว่าต้องการลบสินค้านี้?</p>
            <div style="display: flex; gap: 10px;">
                <button onclick="closeDeleteModal()" style="flex: 1; padding: 12px; border: none; border-radius: 8px; background: #f3f4f6; color: #374151; font-weight: 600; cursor: pointer;">ยกเลิก</button>
                <button onclick="executeDelete()" style="flex: 1; padding: 12px; border: none; border-radius: 8px; background: #e63946; color: white; font-weight: 600; cursor: pointer;">ยืนยันลบ</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/axios@1.1.2/dist/axios.min.js"></script>
    <script src="../../js/api.js"></script>
    <script src="index.js"></script>
</body>
</html>
