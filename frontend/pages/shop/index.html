<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Shop - TanX Shop</title>
    <link rel="stylesheet" href="../../assets/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <nav class="navbar">
        <div class="brand" onclick="location.href='../../index.html'" style="cursor:pointer">
            <h2 class="brand-title">TanX Shop</h2>
        </div>
        <div class="nav-menu">
            <a href="../../index.html">หน้าหลัก</a>
            <a href="index.html" class="active">ร้านค้า</a>
        </div>
        <div class="nav-right-group">
            <div class="cart-wrapper" onclick="toggleCart()">
                <button class="icon-btn">
                    <i class="fa-solid fa-cart-shopping"></i>
                    <span id="cart-count" class="cart-badge">0</span>
                </button>
            </div>
            <div id="auth-section" class="user-menu-container"></div>
        </div>
    </nav>

    <div id="toast-msg" class="alert-toast"></div>

    <div id="cartModal" class="cart-modal">
        <div class="cart-header">
            <h2 style="font-size: 1.2rem;">🛒 ตะกร้าสินค้า</h2>
            <button class="cart-close" onclick="toggleCart()"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div id="cart-items"></div>
        <div class="cart-footer">
            <div class="cart-summary-line">
                <span>ยอดรวมทั้งหมด</span>
                <span id="cart-total" style="color: #e63946; font-weight: 700;">0</span>
            </div>
            <button class="checkout-btn" onclick="checkout()">ยืนยันการสั่งซื้อ</button>
        </div>
    </div>

    <div class="category-filter">
        <button class="filter-btn active" onclick="filterProducts('all', this)">ทั้งหมด</button>
        <button class="filter-btn" onclick="filterProducts('monitor', this)">จอภาพ</button>
        <button class="filter-btn" onclick="filterProducts('mouse', this)">เมาส์</button>
        <button class="filter-btn" onclick="filterProducts('keyboard', this)">คีย์บอร์ด</button>
        <button class="filter-btn" onclick="filterProducts('headset', this)">หูฟัง</button>
        <button class="filter-btn" onclick="filterProducts('vga', this)">การ์ดจอ</button>
        <button class="filter-btn" onclick="filterProducts('cpu', this)">ซีพียู</button>
        <button class="filter-btn" onclick="filterProducts('notebook', this)">โน้ตบุ๊ก</button>
    </div>

    <div id="pagination" class="pagination-container" style="margin-top: 0; margin-bottom: 25px;"></div>
    
    <div class="grid" id="products"></div>

    <div id="loginModal" class="modal-overlay">
        <div class="auth-modal">
            <button class="close-modal" onclick="closeModal('loginModal')">✕</button>
            <h2>เข้าสู่ระบบ</h2>
            <div class="modal-input-group">
                <input type="text" id="login-username" placeholder="ชื่อผู้ใช้">
            </div>
            <div class="modal-input-group">
                <input type="password" id="login-password" placeholder="รหัสผ่าน">
                <i class="fa-solid fa-eye modal-toggle-password" id="login-eye" onclick="togglePassword('login-password', 'login-eye')"></i>
            </div>
            <div id="login-alert" class="alert-box error"></div>
            <button class="modal-btn-submit" onclick="modalLogin()">เข้าสู่ระบบ</button>
            <p class="modal-footer-text">
                ยังไม่มีบัญชี? <a href="#" onclick="switchModal('loginModal', 'registerModal')">สมัครสมาชิกที่นี่</a>
            </p>
        </div>
    </div>

    <div id="registerModal" class="modal-overlay">
        <div class="auth-modal">
            <button class="close-modal" onclick="closeModal('registerModal')">✕</button>
            <h2>สร้างบัญชีใหม่</h2>
            <div class="modal-input-group">
                <input type="text" id="reg-username" placeholder="ชื่อผู้ใช้ (Username)">
            </div>
            <div class="modal-input-group">
                <input type="password" id="reg-password" placeholder="รหัสผ่าน (Password)">
                <i class="fa-solid fa-eye modal-toggle-password" id="reg-eye" onclick="togglePassword('reg-password', 'reg-eye')"></i>
            </div>
            <div class="modal-input-group">
                <input type="text" id="reg-firstname" placeholder="ชื่อจริง">
            </div>
            <div class="modal-input-group">
                <input type="text" id="reg-lastname" placeholder="นามสกุล">
            </div>
            <div id="reg-alert" class="alert-box"></div>
            <button class="modal-btn-submit" onclick="modalRegister()">สมัครสมาชิก</button>
            <p class="modal-footer-text">
                มีบัญชีอยู่แล้ว? <a href="#" onclick="switchModal('registerModal', 'loginModal')">เข้าสู่ระบบ</a>
            </p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/axios@1.1.2/dist/axios.min.js"></script>
    <script src="../../js/api.js"></script>
    <script src="index.js"></script>
</body>
</html>
